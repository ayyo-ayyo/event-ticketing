# ─────────────────────────────────────────────────────────────────────────────
# COMPSCI 426 — Team Project compose.yml
#
# This file defines the Holmes investigation container and a shared network.
# Add your own services below the "Add your services here" section.
#
# Every service you add must be attached to `team-net` so it is reachable
# from holmes by service name.
#
# Quick reference:
#   Start everything:          docker compose up --build
#   Open a shell in holmes:    docker compose exec holmes bash
#   View logs:                 docker compose logs -f
#   Check health:              docker compose ps
# ─────────────────────────────────────────────────────────────────────────────

networks:
  team-net:
    driver: bridge

services:

  # ── Holmes — System Investigation Container ────────────────────────────────
  # A persistent container with curl, wget, jq, k6, psql, redis-cli, Node,
  # Python, bat, lsd, fd, ripgrep, Neovim + LazyVim, and more.
  #
  # Use it to inspect and test your services from inside the Docker network:
  #
  #   docker compose exec holmes bash
  #   curl http://order-service:3000/health | jq .
  #   psql postgres://user:pass@postgres:5432/mydb
  #   redis-cli -h redis ping
  #   k6 run /workspace/k6/sprint-1.js
  #
  # Your repo root is mounted at /workspace, so all k6 scripts and files
  # are accessible without copying them into the container.
  #
  # See holmes/README.md for a full tool reference.
  holmes:
    build:
     context: ./holmes
     dockerfile: Dockerfile
    container_name: holmes
    restart: unless-stopped
    volumes:
      - .:/workspace
    networks:
     - team-net
    environment:
     - TERM=xterm-256color
    # Holmes has no ports — access it via: docker compose exec holmes bash

  event-catalog-service:
    build: ./event-catalog-service
    container_name: event-catalog-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    networks:
      - team-net
    environment:
      - PORT=3001
      - DATABASE_URL=postgres://catalog:catalog@event-catalog-db:5432/event_catalog
      - REDIS_URL=redis://redis:6379
    depends_on:
      event-catalog-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  ticket-purchase-service:
    build: ./ticket-purchase-service
    container_name: ticket-purchase-service
    restart: unless-stopped
    ports:
      - "3002:3002"
    networks:
      - team-net
    environment:
      PORT: 3002
      DATABASE_URL: postgres://postgres:postgres@purchase-db:5432/purchase_db
      REDIS_URL: redis://redis:6379
      PAYMENT_SERVICE_URL: http://payment-service:3003
    depends_on:
      purchase-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      event-catalog-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      start_period: 15s

  payment-service:
    build: ./payment-service
    container_name: payment-service
    restart: unless-stopped
    ports:
      - "3003:3003"
    networks:
      - team-net
    environment:
      - PORT=3003
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s


  refund-service:
    build: ./refund-service
    container_name: refund-service
    restart: unless-stopped
    ports:
      - "3006:3006"
    networks:
      - team-net
    environment:
      - PORT=3006
      - DATABASE_URL=postgres://postgres:password@refund-service-db:5432/refund-service
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      refund-service-db:
        condition: service_healthy
      ticket-purchase-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3006/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  purchase-db:
    image: postgres:16
    container_name: purchase-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: purchase_db
    volumes:
      - purchase-db-data:/var/lib/postgresql/data
      - ./ticket-purchase-service/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - team-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d purchase_db"]
      interval: 5s
      timeout: 3s
      retries: 5
  event-catalog-db:
    image: postgres:16
    container_name: event-catalog-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog
      POSTGRES_DB: event_catalog
    volumes:
      - event-catalog-db-data:/var/lib/postgresql/data
      - ./event-catalog-service/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - team-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog -d event_catalog"]
      interval: 5s
      timeout: 3s
      retries: 10

  refund-service-db:
    image: postgres:16
    container_name: refund-service-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: refund-service
    volumes:
      - refund-service-db-data:/var/lib/postgresql/data
      - ./refund-service/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - team-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d refund-service"]
      interval: 5s
      timeout: 3s
      retries: 10


  notification-service:
    build: ./notification-service
    container_name: notification-service
    restart: unless-stopped
    ports:
      - "3004:3004"
    networks:
      - team-net
    environment:
      PORT: 3004
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3004/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    networks:
      - team-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  waitlist-worker:
    build: ./waitlist-worker
    container_name: waitlist-worker
    restart: unless-stopped
    ports:
      - "3005:3005"
    networks:
      - team-net
    environment:
      - PORT=3005
      - REDIS_URL=redis://redis:6379
      - TICKET_PURCHASE_SERVICE_URL=http://ticket-purchase-service:3002
    depends_on:
      redis:
        condition: service_healthy
      ticket-purchase-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3005/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  purchase-db-data:
  event-catalog-db-data:
  refund-service-db-data:
