# ─────────────────────────────────────────────────────────────────────────────
# COMPSCI 426 — Team Project compose.yml
#
# This file defines the Holmes investigation container and a shared network.
# Add your own services below the "Add your services here" section.
#
# Every service you add must be attached to `team-net` so it is reachable
# from holmes by service name.
#
# Quick reference:
#   Start everything:          docker compose up --build
#   Open a shell in holmes:    docker compose exec holmes bash
#   View logs:                 docker compose logs -f
#   Check health:              docker compose ps
# ─────────────────────────────────────────────────────────────────────────────

networks:
  team-net:
    driver: bridge

services:

  # ── Holmes — System Investigation Container ────────────────────────────────
  # A persistent container with curl, wget, jq, k6, psql, redis-cli, Node,
  # Python, bat, lsd, fd, ripgrep, Neovim + LazyVim, and more.
  #
  # Use it to inspect and test your services from inside the Docker network:
  #
  #   docker compose exec holmes bash
  #   curl http://order-service:3000/health | jq .
  #   psql postgres://user:pass@postgres:5432/mydb
  #   redis-cli -h redis ping
  #   k6 run /workspace/k6/sprint-1.js
  #
  # Your repo root is mounted at /workspace, so all k6 scripts and files
  # are accessible without copying them into the container.
  #
  # See holmes/README.md for a full tool reference.
  holmes:
    build:
      context: ./holmes
      dockerfile: Dockerfile
    container_name: holmes
    restart: unless-stopped
    volumes:
      - .:/workspace
    networks:
      - team-net
    environment:
      - TERM=xterm-256color
    # Holmes has no ports — access it via: docker compose exec holmes bash

  # ── Add your services here ─────────────────────────────────────────────────
  #
  # Pattern for each service:
  #
  # your-service:
  #   build: ./your-service
  #   container_name: your-service
  #   restart: unless-stopped
  #   ports:
  #     - "3001:3001"          # expose on host for local testing
  #   networks:
  #     - team-net             # REQUIRED — makes it reachable from holmes
  #   environment:
  #     - DATABASE_URL=postgres://user:pass@postgres:5432/yourdb
  #     - REDIS_URL=redis://redis:6379
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 3
  #     start_period: 15s
  #

  ticket-purchase-service:
    build: ./ticket-purchase-service
    container_name: ticket-purchase-service
    restart: unless-stopped
    ports:
      - "3002:3002"
    networks:
      - team-net
    environment:
      PORT: 3002
      DATABASE_URL: postgres://postgres:postgres@purchase-db:5432/purchase_db
      REDIS_URL: redis://redis:6379
      PAYMENT_SERVICE_URL: http://payment-service:3003
    depends_on:
      purchase-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      start_period: 15s

  purchase-db:
    image: postgres:16
    container_name: purchase-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: purchase_db
    volumes:
      - purchase-db-data:/var/lib/postgresql/data
      - ./ticket-purchase-service/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - team-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d purchase_db"]
      interval: 5s
      timeout: 3s
      retries: 5
  # ── Postgres template ──────────────────────────────────────────────────────
  #
  # postgres:
  #   image: postgres:16
  #   container_name: postgres
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: user
  #     POSTGRES_PASSWORD: pass
  #     POSTGRES_DB: mydb
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - team-net
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U user -d mydb"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 5
  #
  # ── Redis template ─────────────────────────────────────────────────────────
  #
  # redis:
  #   image: redis:7
  #   container_name: redis
  #   restart: unless-stopped
  #   networks:
  #     - team-net
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 5
  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    networks:
      - team-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  event-catalog-service:
    build: ./event-catalog-service
    container_name: event-catalog-service
    restart: unless-stopped
    ports:
      - "3003:3003"
    networks:
      - team-net
    environment:
      - PORT=3003
      - DATABASE_URL=postgres://catalog:catalog@event-catalog-db:5432/event_catalog
      - REDIS_URL=redis://redis:6379
    depends_on:
      event-catalog-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  event-catalog-db:
    image: postgres:16
    container_name: event-catalog-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog
      POSTGRES_DB: event_catalog
    volumes:
      - event-catalog-db-data:/var/lib/postgresql/data
    networks:
      - team-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog -d event_catalog"]
      interval: 5s
      timeout: 3s
      retries: 10

  # redis: Redis was already defined so I commented this out because 
  # the duplicate definitions was causing an error - Sean
  #
  #   image: redis:7
  #   container_name: redis
  #   restart: unless-stopped
  #   networks:
  #     - team-net
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 10

# ── Named volumes ──────────────────────────────────────────────────────────────
# Declare a volume for each database here, e.g.:
#
# volumes:
#   postgres-data:
volumes:
  purchase-db-data:
  event-catalog-db-data:
