# ─────────────────────────────────────────────────────────────────────────────
# COMPSCI 426 — Team Project compose.yml
#
# This file defines the Holmes investigation container and a shared network.
# Add your own services below the "Add your services here" section.
#
# Every service you add must be attached to `team-net` so it is reachable
# from holmes by service name.
#
# Quick reference:
#   Start everything:          docker compose up --build
#   Open a shell in holmes:    docker compose exec holmes bash
#   View logs:                 docker compose logs -f
#   Check health:              docker compose ps
# ─────────────────────────────────────────────────────────────────────────────

networks:
  team-net:
    driver: bridge

services:

  # ── Holmes — System Investigation Container ────────────────────────────────
  # A persistent container with curl, wget, jq, k6, psql, redis-cli, Node,
  # Python, bat, lsd, fd, ripgrep, Neovim + LazyVim, and more.
  #
  # Use it to inspect and test your services from inside the Docker network:
  #
  #   docker compose exec holmes bash
  #   curl http://order-service:3000/health | jq .
  #   psql postgres://user:pass@postgres:5432/mydb
  #   redis-cli -h redis ping
  #   k6 run /workspace/k6/sprint-1.js
  #
  # Your repo root is mounted at /workspace, so all k6 scripts and files
  # are accessible without copying them into the container.
  #
  # See holmes/README.md for a full tool reference.
  holmes:
    build:
      context: ./holmes
      dockerfile: Dockerfile
    container_name: holmes
    restart: unless-stopped
    volumes:
      - .:/workspace
    networks:
      - team-net
    environment:
      - TERM=xterm-256color
    # Holmes has no ports — access it via: docker compose exec holmes bash

  event-catalog:
    build: ./event-catalog
    container_name: event-catalog
    restart: unless-stopped
    ports:
      - "3001:3001"   #Expose on host for local testing
    networks:
      - team-net #MUST HAVE for redis
    environment:
      - DATABASE_URL=postgres://user:pass@events-db:5432/eventsdb
      - REDIS_URL=redis://redis:6379
      - PORT=3001
    depends_on:
      events-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  ticket-purchase:
    build: ./ticket-purchase
    container_name: ticket-purchase
    restart: unless-stopped
    ports:
      - "3002:3002"
    networks:
      - team-net
    environment:
      - DATABASE_URL=postgres://user:pass@tickets-db:5432/ticketsdb
      - EVENT_CATALOG_URL=http://event-catalog:3001
      - PAYMENT_SERVICE_URL=http://payment-service:3003
      - PORT=3002
    depends_on:
      tickets-db:
        condition: service_healthy
      event-catalog:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  payment-service:
    build: ./payment-service
    container_name: payment-service
    restart: unless-stopped
    ports:
      - "3003:3003"
    networks:
      - team-net
    environment:
      - DATABASE_URL=postgres://user:pass@tickets-db:5432/ticketsdb
      - PORT=3003
    depends_on:
      tickets-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  events-db:
    image: postgres:16
    container_name: events-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: eventsdb
    volumes:
      - events-db-data:/var/lib/postgresql/data
    networks:
      - team-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d eventsdb"]
      interval: 5s
      timeout: 3s
      retries: 5

  tickets-db:
    image: postgres:16
    container_name: tickets-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: ticketsdb
    volumes:
      - tickets-db-data:/var/lib/postgresql/data
    networks:
      - team-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ticketsdb"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    networks:
      - team-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  events-db-data:
  tickets-db-data: